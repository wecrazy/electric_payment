<div id="dataPMMTI" class="accordion accordion-popout">
    <div class="accordion-item card">
        <div class="accordion-header text-body d-flex justify-content-between align-items-center"
            id="accordionPopoutIconOne">
            <div class="d-flex align-items-center">
                <button type="button" class="accordion-button bg-info text-white" data-bs-toggle="collapse"
                    data-bs-target="#dataPMMTI-1" aria-controls="dataPMMTI-1" aria-expanded="true">
                    <div class="display-5 me-4">
                        <i class="fad fa-chart-pie me-2"></i>
                        PM (Preventive Maintenance)
                    </div>
                </button>
            </div>

            <!-- RIGHT: ..... -->
            <div class="d-flex align-items-center flex-shrink-0 ms-auto ps-3">
                <div class="last_updated_data_mti text-muted me-3" style="min-width: 150px;">
                    <!-- Last Update -->
                </div>

                <div class="dropdown me-2">
                    <button class="btn btn-success excel-report dropdown-toggle disabled" type="button"
                        data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="far fa-file-spreadsheet me-2"></i>
                        Report
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#"
                                onclick="downloadExcelReportPMMTI('{{.userid}}','{{.REPORT_ALL_PM_MTI}}', 'ALL')">All
                                Data</a></li>
                        <li><a class="dropdown-item" href="#"
                                onclick="downloadExcelReportPMMTI('{{.userid}}','{{.REPORT_DATA_FILTERED_PM_MTI}}', 'Filtered')">Data
                                <b>(Filtered)</b></a></li>
                    </ul>
                </div>

                <button type="button" class="btn btn-secondary btn-refresh-data-mti me-2"
                    onclick="refreshDataMTI('{{.REFRESH_TABLE_DATA_MTI}}', 'last_updated_data_mti', 'dt_data_pm_mti', 'btn-refresh-data-mti')">
                    <i class="far fa-sync-alt me-2"></i>
                    Refresh
                </button>
            </div>

        </div>

        <div id="dataPMMTI-1" class="accordion-collapse collapse show" data-bs-parent="#dataPMMTI">
            <div class="accordion-body mt-3">
                {{.TABLE_DATA_PM_MTI}}
            </div>
        </div>
    </div>
</div>
