APP:
  HOST: "127.0.0.1"
  GIN_MODE: "debug"
  NAME: "Example Service Application"
  LOGO: "/assets/example/img/logo.png"
  PORT: "8080"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "TEXT"
  WEB_PUBLIC_URL: "http://localhost:8080"
  VERSION: "Development"
  VERSION_NO: 1
  VERSION_CODE: "0.0.0.0.0000.00.00"
  VERSION_NAME: "example_service"
  STATIC_DIR: "./web"
  PUBLISHED_DIR: "assets"
  LOG_DIR: "./log"
  UPLOAD_DIR: "./uploads"
  LOGIN_TIME_M: "120"
  COOKIE_LOGIN_DOMAIN: ""
  COOKIE_LOGIN_SECURE: false
  MAX_DISCONNECTION_TIME: "10"
  AES_KEY: "exampleaeskey1234567890123456"
  AES_KEY_IV: "exampleaesiv1234"
  MAX_RETRY_LOGIN: 3
  LOGIN_LOCK_UNTIL: 5
  APP_LOG_FILENAME: "app.log"
  SYSTEM_LOG_FILENAME: "system.log"

DEFAULT:
  TIMEZONE: "Asia/Jakarta"
  MIN_LENGTH_PHONE_NUMBER: 9
  MAX_MESSAGE_CHAR: 1000
  MAX_IMAGE_SIZE: 2
  XAMPP_MYSQL_PATH: "C:/xampp/mysql_start.bat"
  NSSM_FULLPATH: "bin/nssm/win64/nssm.exe"
  MAGICK_FULLPATH: "/usr/bin/convert"
  API_KEY_API_ANALYTICS_DEV: "example-api-key-0000"
  CONCURRENCY_LIMIT: 2
  WELCOME_ID: |
    Halo! Ini adalah pesan sambutan contoh.
    Sistem sedang berjalan dalam mode pengembangan.

  WELCOME_EN: |
    Hello! This is an example welcome message.
    The system is currently running in development mode.

EMAIL:
  HOST: "imap.example.com"
  PORT: 993
  USERNAME: "example@example.com"
  PASSWORD: "example_password"
  SENDER: "Example Service"
  MAX_RETRY: 3
  RETRY_DELAY: 10
  MAX_ATTACHMENT_SIZE: 10

REDIS:
  HOST: "127.0.0.1"
  PORT: 6379
  PASSWORD: ""
  DB: 0
  MAX_RETRY: 3
  RETRY_DELAY: 3

DATABASE:
  TYPE: "MySQL"
  HOST: "127.0.0.1"
  PORT: "3306"
  USERNAME: "example_user"
  PASSWORD: "example_password"
  NAME: "example_database"
  MAX_RETRY_CONNECT: 3
  RETRY_DELAY: 3
  MAX_IDLE_CONNECTION: 5
  MAX_OPEN_CONNECTION: 5
  MAX_LIFETIME_CONNECTION: 1
  DB_CONFIG_PATH: "database/dbconfig.yaml"
  DB_BACKUP_DESTINATION_DIR: "database"

  TB_ADMIN: "admins"
  TB_ADMIN_PWD_CHANGELOG: "admin_password_changelog"
  TB_ADMIN_STATUS: "admin_statuses"
  TB_FEATURE: "features"
  TB_LOG_ACTIVITY: "log_activities"
  TB_ROLE: "roles"
  TB_ROLE_PRIVILEGE: "role_privileges"
  TB_LANGUAGE: "languages"
  TB_BAD_WORD: "bad_words"
  TB_WEB_APP_CONFIG: "web_app_config"
  TB_INDONESIA_REGION: "indonesia_region"
